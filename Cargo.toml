[workspace]
resolver = "3"
members = ["odorobo-agent", "odoroboctl", "odorobo-scheduler", "odorobo-shared"]

[workspace.dependencies]
stable-eyre = "0.2.2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
    "env-filter",
    "fmt",
    "json",
] }
cloud-hypervisor-client = "0.3"
serde_json = "1.0.149"
serde = "1.0"
axum = { version = "0.8.8", features = ["ws"] }
thiserror = "2.0.18"
axum-extra = "0.12"
tower-http = { version = "0.6", features = ["trace"] }
tokio = { version = "1.50.0" }
kameo = { version = "0.19.2", features = ["remote"] }
libp2p = { version = "0.56.0", features = ["yamux", "serde", "mdns"] }
ahash = { version = "0.8.12", features = ["serde"] }
ulid = { version = "1.2", features = ["serde"] }

odorobo-shared = { path = "odorobo-shared" }
odorobo-agent = { path = "odorobo-agent" }
odoroboctl = { path = "odoroboctl" }
odorobo-scheduler = { path = "odorobo-scheduler" }


[profile.release-optimized]
# these are for performance optimizations, based on https://nnethercote.github.io/perf-book/build-configuration.html#optimization-level
# these options can take a while to compile (up to 5-10 minutes), so its really only necessary for production binaries.

# you should also try to setup rustflags -C target-cpu=native, but this only works on the target machine. 
# this enables microarchitecture optimizations, which is just better if we can.
# You can also set the target-cpu to do cross compilation if you know the exact micro architecture of the target machine.

inherits = "release"

opt-level = 3
lto = "fat"
codegen-units = 1

# we are specifically NOT using panic = "abort" because we need to use catch_unwind for kameo actors on_panic. 
# for any crates using kameo actors on_panic, this would literally break the binary.
# For specific crates/binaries this might be something we do, but I doubt it.

strip = "symbols" # TODO: this we should talk about doing this, because it makes debugging harder, so if we have a panic in production, the backtrace will likely not be as useful.

incremental = false # this is just to get reproducible builds. incremental compiles aren't consistent and can sometimes be broken when combined with optimizations