[workspace]
resolver = "3"
members = ["odorobo-agent", "odoroboctl", "odorobo-scheduler", "odorobo-shared"]

[workspace.dependencies]
stable-eyre = "0.2.2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = [
    "env-filter",
    "fmt",
    "json",
] }
cloud-hypervisor-client = "0.3"
serde_json = "1.0.149"
serde = "1.0"
axum = { version = "0.8.8", features = ["ws"] }
thiserror = "2.0.18"
axum-extra = "0.12"
tower-http = { version = "0.6", features = ["trace"] }
tokio = { version = "1.50.0" }
kameo = { version = "0.19.2", features = ["remote"] }
libp2p = { version = "0.56.0", features = ["yamux", "serde", "mdns"] }
ahash = { version = "0.8.12", features = ["serde"] }
ulid = { version = "1.2", features = ["serde"] }

odorobo-shared = { path = "odorobo-shared" }
odorobo-agent = { path = "odorobo-agent" }
odoroboctl = { path = "odoroboctl" }
odorobo-scheduler = { path = "odorobo-scheduler" }
